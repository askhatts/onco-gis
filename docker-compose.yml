services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./frontend/public:/app/frontend/public
      - ./raws:/app/raws
    environment:
      - PUBLIC_DIR=/app/frontend/public
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
